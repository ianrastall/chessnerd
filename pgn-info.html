      (() => {
        try {
          const storedTheme = localStorage.getItem('theme');
          const theme = storedTheme === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);

          const storedAccent = localStorage.getItem('accentColor');
          if (!storedAccent || !/^#[0-9a-fA-F]{6}$/.test(storedAccent)) return;

          const normalized = storedAccent.toLowerCase();
          document.documentElement.style.setProperty('--accent', normalized);

          const parsed = parseInt(normalized.slice(1), 16);
          const red = (parsed >> 16) & 255;
          const green = (parsed >> 8) & 255;
          const blue = parsed & 255;
          document.documentElement.style.setProperty('--accent-rgb', `${red}, ${green}, ${blue}`);

          const boost = 20;
          const accentLight = '#' + (
            (Math.min(red + boost, 255) << 16) |
            (Math.min(green + boost, 255) << 8) |
            Math.min(blue + boost, 255)
          ).toString(16).padStart(6, '0');
          document.documentElement.style.setProperty('--accent-light', accentLight);
        } catch {
          // Ignore storage access errors.
        }
      })();
